spring.application.name=fleetService

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5433/booking_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# CORRECTED: Server Port Configuration
server.port=8085

# Exclude Gateway MVC auto-config if it's still leaking into your classpath
spring.autoconfigure.exclude=org.springframework.cloud.gateway.server.mvc.GatewayServerMvcAutoConfiguration